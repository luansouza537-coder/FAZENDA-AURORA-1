<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Fundo de terra -->
  <rect width="80" height="80" rx="16" fill="#8B4513"/>
  <rect x="0" y="48" width="80" height="32" rx="0" fill="#5D2E0C"/>
  <rect x="0" y="60" width="80" height="20" rx="0" fill="#3B1A07"/>

  <!-- Minhoca 1 (vermelha-rosada, grande, em S) -->
  <path d="M12 55 Q18 42 24 50 Q30 58 36 46" stroke="#E75480" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="12" cy="55" r="3.5" fill="#FF6B9D"/>
  <circle cx="11" cy="53.5" r="1" fill="#1a1a1a"/>
  <circle cx="13" cy="53.5" r="1" fill="#1a1a1a"/>

  <!-- Minhoca 2 (laranja, menor) -->
  <path d="M40 62 Q48 52 54 60 Q60 68 66 58" stroke="#D2691E" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="40" cy="62" r="2.8" fill="#E8854A"/>
  <circle cx="39" cy="60.8" r="0.9" fill="#1a1a1a"/>
  <circle cx="41" cy="60.8" r="0.9" fill="#1a1a1a"/>

  <!-- Minhoca 3 (rosa claro, saindo da terra) -->
  <path d="M25 68 Q28 58 32 65" stroke="#FFB6C1" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="25" cy="68" r="2.2" fill="#FFC8D3"/>

  <!-- Minhoca 4 (marrom escuro, fundo) -->
  <path d="M50 72 Q56 65 62 72" stroke="#A0522D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="50" cy="72" r="2" fill="#B8643D"/>

  <!-- Húmus / terra com textura -->
  <circle cx="20" cy="70" r="2" fill="#6B3A0F" opacity="0.6"/>
  <circle cx="45" cy="75" r="1.5" fill="#6B3A0F" opacity="0.5"/>
  <circle cx="68" cy="70" r="1.8" fill="#6B3A0F" opacity="0.5"/>

  <!-- Folhinhas na superfície -->
  <ellipse cx="30" cy="49" rx="4" ry="2" fill="#5E8B3A" opacity="0.8" transform="rotate(-15 30 49)"/>
  <ellipse cx="55" cy="47" rx="3" ry="1.5" fill="#4A7A2A" opacity="0.8" transform="rotate(10 55 47)"/>
</svg>
